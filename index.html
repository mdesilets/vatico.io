  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
    template = template.replace(/font-display:\s*swap/gi, 'font-display: block');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Inject a style rule that keeps the real page invisible until fonts load,
    // preventing the flash of unstyled text (FOUT) after replaceWith.
    template = template.replace(
      /<\/head>/i,
      '<style id="__fout-guard">' +
        'body{opacity:0!important}' +
        '#__font-loader{position:fixed;inset:0;z-index:99999;background:#08090d;display:grid;place-items:center;transition:opacity .45s ease-out}' +
      '</style></head>'
    );
    template = template.replace(
      /<body([^>]*)>/i,
      '<body$1><div id="__font-loader">' +
        '<svg width="280" height="60" viewBox="0 0 280 60" xmlns="http://www.w3.org/2000/svg">' +
          '<text x="140" y="46" text-anchor="middle" fill="#e4e8f4" font-family="Inter,system-ui,sans-serif" font-weight="900" font-size="52" letter-spacing="-2">vatico</text>' +
        '</svg>' +
      '</div>'
    );

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // Reveal the page only after all fonts have loaded — eliminates FOUT.
    await document.fonts.ready;
    const guard = document.getElementById('__fout-guard');
    if (guard) guard.remove();
    const loader = document.getElementById('__font-loader');
    if (loader) {
      loader.style.opacity = '0';
      loader.addEventListener('transitionend', () => loader.remove(), { once: true });
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Vatico<\u002Ftitle>\n\n<style>\n  @font-face {\n    font-family: 'Inter';\n    src: url(\"0cfc17d2-7fbb-449d-85ab-1c7f983c38e7\") format('truetype');\n    font-weight: 100 900;\n    font-display: swap;\n  }\n\n  :root {\n    --bg: #08090d;\n    --bg-2: #0b0e1a;\n    --surface: #0d0f15;\n    --border: #1c2032;\n    --muted: #5a6180;\n    --muted-2: #8892b0;\n    --text: #e4e8f4;\n    --blue: #3B82F6;\n    --purple: #A855F7;\n    --cyan: #00A3E0;\n    --green: #10B981;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  html, body {\n    height: 100%;\n    overflow: hidden;\n    background: var(--bg);\n    color: var(--text);\n    font-family: 'Inter', system-ui, sans-serif;\n    font-feature-settings: 'ss01', 'cv11';\n    -webkit-font-smoothing: antialiased;\n    cursor: default;\n  }\n\n  .stage {\n    position: fixed;\n    inset: 0;\n    /* hero gradient per design system */\n    background:\n      radial-gradient(ellipse 80% 60% at 50% 50%, rgba(59,130,246,0.09) 0%, transparent 60%),\n      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(168,85,247,0.05) 0%, transparent 70%),\n      linear-gradient(180deg, #08090d 0%, #0b0e1a 55%, #08090d 100%);\n    overflow: hidden;\n  }\n\n  /* canvas holds the pixel-grid radar */\n  canvas#grid {\n    position: absolute;\n    inset: 0;\n    width: 100%;\n    height: 100%;\n    display: block;\n  }\n\n  /* subtle vignette so the logo area sits visually on top */\n  .vignette {\n    position: absolute;\n    inset: 0;\n    background:\n      radial-gradient(ellipse 34% 28% at 50% 50%, rgba(8,9,13,0.72) 0%, rgba(8,9,13,0.35) 50%, transparent 78%);\n    pointer-events: none;\n    z-index: 2;\n  }\n\n  /* hairline grid for extra data-dense texture */\n  .hairlines {\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(28,32,50,0.35) 1px, transparent 1px),\n      linear-gradient(90deg, rgba(28,32,50,0.35) 1px, transparent 1px);\n    background-size: 80px 80px;\n    mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 80%);\n    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, black 20%, transparent 80%);\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  /* center content */\n  .center {\n    position: absolute;\n    inset: 0;\n    display: grid;\n    place-items: center;\n    z-index: 3;\n    pointer-events: none;\n  }\n\n  .logo-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 28px;\n    opacity: 0;\n    transform: translateY(4px);\n    animation: logo-in 1200ms cubic-bezier(.22,.61,.36,1) 220ms forwards;\n  }\n\n  @keyframes logo-in {\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  .logo {\n    width: clamp(220px, 26vw, 420px);\n    height: auto;\n    display: block;\n    filter: drop-shadow(0 0 24px rgba(59,130,246,0.18));\n  }\n\n  .tick {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    font-size: 10.5px;\n    font-weight: 500;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  .tick .dot {\n    width: 6px;\n    height: 6px;\n    border-radius: 50%;\n    background: var(--blue);\n    box-shadow: 0 0 8px rgba(59,130,246,0.6);\n    animation: pulse 2200ms ease-in-out infinite;\n  }\n\n  @keyframes pulse {\n    0%, 100% { opacity: 0.45; transform: scale(1); }\n    50% { opacity: 1; transform: scale(1.25); }\n  }\n\n  .tick .sep {\n    color: var(--border);\n  }\n\n  /* corner chrome — data-dense feel, tiny */\n  .corner {\n    position: absolute;\n    z-index: 4;\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--muted);\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    pointer-events: none;\n    opacity: 0;\n    animation: chrome-in 900ms ease-out 700ms forwards;\n  }\n  @keyframes chrome-in { to { opacity: 1; } }\n\n  .corner.tl { top: 28px; left: 32px; }\n  .corner.tr { top: 28px; right: 32px; }\n  .corner.bl { bottom: 28px; left: 32px; }\n  .corner.br { bottom: 28px; right: 32px; }\n\n  .corner .swatch {\n    width: 6px;\n    height: 6px;\n    background: var(--blue);\n    border-radius: 1px;\n  }\n  .corner .swatch.g { background: var(--green); }\n  .corner .swatch.a { background: #F59E0B; }\n\n  .corner .mono {\n    font-family: 'Cascadia Code', Consolas, ui-monospace, monospace;\n    font-size: 10.5px;\n    color: var(--muted-2);\n    letter-spacing: 0.05em;\n    text-transform: none;\n  }\n\n  .corner .sep { color: var(--border); margin: 0 2px; }\n\n  @media (max-width: 700px) {\n    .corner.tr, .corner.br { display: none; }\n    .corner.tl, .corner.bl { font-size: 9px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <div class=\"stage\">\n    <canvas id=\"grid\"><\u002Fcanvas>\n    <div class=\"hairlines\"><\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n\n    <div class=\"center\">\n      <div class=\"logo-wrap\">\n        <img class=\"logo\" src=\"3071c7fb-6767-4b58-bfbb-208dbc4c7ed6\" alt=\"Vatico\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<script>\n(() => {\n  const canvas = document.getElementById('grid');\n  const ctx = canvas.getContext('2d');\n  const freqEl = document.getElementById('freq');\n\n  const DPR = Math.min(window.devicePixelRatio || 1, 2);\n  const CELL = 18;          // logical px per cell\n  const DOT_MIN = 1.2;      // min dot radius\n  const DOT_MAX = 2.6;      // max dot radius (pulse peak)\n\n  let W = 0, H = 0, cols = 0, rows = 0;\n  let cells = [];           // per-cell baseline noise seed\n  let centerX = 0, centerY = 0;\n\n  // radar sweeps - multiple concentric rings expanding at different phases\n  const sweeps = [\n    { phase: 0.0, speed: 0.00022, maxR: 1.2 },\n    { phase: 0.33, speed: 0.00022, maxR: 1.2 },\n    { phase: 0.66, speed: 0.00022, maxR: 1.2 },\n  ];\n\n  function resize() {\n    W = window.innerWidth;\n    H = window.innerHeight;\n    canvas.width = Math.floor(W * DPR);\n    canvas.height = Math.floor(H * DPR);\n    canvas.style.width = W + 'px';\n    canvas.style.height = H + 'px';\n    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);\n\n    cols = Math.ceil(W / CELL) + 2;\n    rows = Math.ceil(H / CELL) + 2;\n    centerX = W / 2;\n    centerY = H / 2;\n\n    // seed noise per cell (static phase offsets for individual twinkles)\n    cells = new Array(cols * rows);\n    for (let i = 0; i < cells.length; i++) {\n      cells[i] = {\n        phase: Math.random() * Math.PI * 2,\n        speed: 0.4 + Math.random() * 1.1,\n        seed: Math.random(),\n      };\n    }\n  }\n\n  // Color mix helper\n  function rgba(r, g, b, a) {\n    return `rgba(${r|0},${g|0},${b|0},${a})`;\n  }\n\n  // Linear interp between two rgb arrays\n  function mix(c1, c2, t) {\n    return [\n      c1[0] + (c2[0] - c1[0]) * t,\n      c1[1] + (c2[1] - c1[1]) * t,\n      c1[2] + (c2[2] - c1[2]) * t,\n    ];\n  }\n\n  // palette (in rgb)\n  const C_DIM    = [28, 32, 50];     // --border — very faint base\n  const C_BLUE   = [59, 130, 246];   // primary accent\n  const C_CYAN   = [0, 163, 224];    // --cyan\n  const C_PURPLE = [168, 85, 247];   // --purple\n  const C_TEXT   = [228, 232, 244];  // hot white for peaks\n\n  // Radius at which logo vignette begins - we fade pixels there\n  let vignetteInner, vignetteOuter;\n\n  function updateVignette() {\n    const d = Math.hypot(W, H) / 2;\n    vignetteInner = Math.min(W, H) * 0.14;\n    vignetteOuter = Math.min(W, H) * 0.30;\n  }\n\n  let start = performance.now();\n  function frame(now) {\n    const t = (now - start) / 1000; // seconds\n\n    // Fade trails — slightly translucent fill so bright pixels trail softly\n    ctx.fillStyle = 'rgba(8, 9, 13, 0.22)';\n    ctx.fillRect(0, 0, W, H);\n\n    const maxR = Math.hypot(W, H) / 2;\n\n    // Advance sweeps — return current ring radii (0..1 normalized)\n    const ringRs = sweeps.map(s => {\n      s.phase += s.speed * 16;\n      if (s.phase > s.maxR) s.phase -= s.maxR;\n      return s.phase * maxR;\n    });\n\n    for (let y = 0; y < rows; y++) {\n      for (let x = 0; x < cols; x++) {\n        const i = y * cols + x;\n        const cell = cells[i];\n        const px = x * CELL;\n        const py = y * CELL;\n\n        // distance from center (for radar ring interaction + vignette)\n        const dx = px - centerX;\n        const dy = py - centerY;\n        const dist = Math.hypot(dx, dy);\n\n        // vignette fade around logo (pixels fade to near-invisible near center)\n        let vign = 1;\n        if (dist < vignetteOuter) {\n          vign = Math.max(0, (dist - vignetteInner) / (vignetteOuter - vignetteInner));\n          vign = Math.pow(vign, 1.4);\n        }\n        if (vign < 0.02) continue;\n\n        // base twinkle (slow sine) — gives the grid a living baseline\n        const twinkle = 0.5 + 0.5 * Math.sin(t * cell.speed + cell.phase);\n\n        // Radar ring proximity — brightest when a ring radius matches pixel's radius\n        let ring = 0;\n        for (let k = 0; k < ringRs.length; k++) {\n          const rr = ringRs[k];\n          const d = Math.abs(dist - rr);\n          const band = 120; // width of the brightened band, px\n          if (d < band) {\n            const v = 1 - d / band;\n            // shape the band: sharper leading edge, soft trail behind the ring\n            const behind = dist < rr ? 0.55 : 1.0;\n            ring = Math.max(ring, Math.pow(v, 2.2) * behind);\n          }\n        }\n\n        // Heatmap noise — slow moving \"hot\" regions via low-freq sine based on position\n        const heat =\n          0.5 + 0.5 * Math.sin(px * 0.004 + t * 0.35)\n              * Math.cos(py * 0.004 + t * 0.22 + cell.seed * 2);\n        const heatAmt = Math.max(0, heat - 0.55) / 0.45; // only the top ~45% counts\n\n        // Combined intensity (0..1)\n        let intensity = 0.12 + twinkle * 0.18 + heatAmt * 0.35 + ring * 0.95;\n        intensity = Math.min(1, intensity);\n        intensity *= vign;\n\n        if (intensity < 0.04) continue;\n\n        // color: base dim → blue → hot white (with rare cyan/purple tint from seed)\n        let color;\n        if (intensity < 0.35) {\n          color = mix(C_DIM, C_BLUE, intensity / 0.35);\n        } else if (intensity < 0.8) {\n          // tiny chance a given cell biases toward purple or cyan\n          const tint = cell.seed > 0.92 ? C_PURPLE : (cell.seed < 0.08 ? C_CYAN : C_BLUE);\n          color = mix(C_BLUE, tint, (intensity - 0.35) / 0.45 * 0.6);\n        } else {\n          const tint = cell.seed > 0.92 ? C_PURPLE : (cell.seed < 0.08 ? C_CYAN : C_BLUE);\n          color = mix(tint, C_TEXT, (intensity - 0.8) / 0.2);\n        }\n\n        const radius = DOT_MIN + (DOT_MAX - DOT_MIN) * intensity;\n        const alpha = 0.35 + intensity * 0.65;\n\n        ctx.fillStyle = rgba(color[0], color[1], color[2], alpha);\n        ctx.beginPath();\n        ctx.arc(px, py, radius, 0, Math.PI * 2);\n        ctx.fill();\n\n        // peak pixels get a faint glow\n        if (intensity > 0.75) {\n          ctx.fillStyle = rgba(color[0], color[1], color[2], (intensity - 0.75) * 0.5);\n          ctx.beginPath();\n          ctx.arc(px, py, radius * 2.6, 0, Math.PI * 2);\n          ctx.fill();\n        }\n      }\n    }\n\n    // update frequency readout in corner tick\n    const hz = 2.4 + Math.sin(t * 0.21) * 0.6 + Math.sin(t * 0.73) * 0.2;\n    if (freqEl) freqEl.textContent = hz.toFixed(2) + ' hz';\n\n    requestAnimationFrame(frame);\n  }\n\n  window.addEventListener('resize', () => { resize(); updateVignette(); });\n  resize();\n  updateVignette();\n\n  // prime the canvas with an opaque black so the first frame's trail step doesn't ghost\n  ctx.fillStyle = '#08090d';\n  ctx.fillRect(0, 0, W, H);\n\n  requestAnimationFrame(frame);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
